name: Build and Push Container Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: bjohns/tiny-container

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Install podman
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y podman

    - name: Log in to GHCR
      run: |
        echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io \
          -u ${{ github.actor }} --password-stdin

    - name: Build image
      run: |
        podman build -f ContainerFile \
          --secret id=github_token,env=GITHUB_TOKEN \
          -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
          .
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Push image
      run: |
        podman push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        podman push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

    - name: Smoke test
      run: |
        podman run --rm --entrypoint tinycode \
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} --version
