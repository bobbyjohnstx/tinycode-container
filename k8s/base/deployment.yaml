apiVersion: apps/v1
kind: Deployment
metadata:
  name: tinycode
  namespace: tinycode
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tinycode
  template:
    metadata:
      labels:
        app: tinycode
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 0
      containers:
      - name: tinycode
        image: quay.io/bjohns/tinycode-container:latest
        ports:
        - containerPort: 4096
          protocol: TCP
        env:
        - name: TINYCODE_PORT
          value: "4096"
        - name: TINYCODE_SERVER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: tinycode-auth
              key: server-password
              optional: true
        # vLLM configuration (issue #4)
        # - name: TINYCODE_VLLM_URL
        #   value: "http://vllm-service.default.svc.cluster.local:8000"
        # - name: TINYCODE_VLLM_MODEL
        #   value: "meta-llama/Llama-3.1-70B-Instruct"
        # GitOps configuration (issue #8)
        # - name: TINYCODE_GIT_REPO
        #   value: "https://github.com/org/repo.git"
        # - name: TINYCODE_GIT_BRANCH
        #   value: "main"
        # - name: TINYCODE_GIT_PULL_ON_RESTART
        #   value: "true"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        # /global/health is now unauthenticated (fixed in tinycode issue #2).
        livenessProbe:
          httpGet:
            path: /global/health
            port: 4096
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /global/health
            port: 4096
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: [ALL]
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - name: tinycode-data
          mountPath: /home/tinycode/.local/share/tinycode
          subPath: data
        - name: tinycode-data
          mountPath: /home/tinycode/.config/tinycode
          subPath: config
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tinycode-data
        persistentVolumeClaim:
          claimName: tinycode-data
      - name: tmp
        emptyDir: {}
