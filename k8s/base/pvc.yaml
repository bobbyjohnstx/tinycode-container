apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tinycode-data
  namespace: tinycode
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tinycode-projects
  namespace: tinycode
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
